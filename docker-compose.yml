version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: beacon_db
    environment:
      POSTGRES_USER: ${DB_USER:-beacon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beacon_secret}
      POSTGRES_DB: ${DB_NAME:-beacon_db}
    ports:
      - "5432:5432"
    volumes:
      - beacon_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-beacon} -d ${DB_NAME:-beacon_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: beacon_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-beacon_redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - beacon_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-beacon_redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  beacon_pg_data:
  beacon_redis_data:
